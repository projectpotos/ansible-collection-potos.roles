---
name: Release projectpotos.roles

# The version bump and changelog land on main through a release PR
on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: read
    uses: projectpotos/actions/.github/workflows/release-ansible-collection.yaml@cc9fa23313351dbc2443f830da4a111f96d293c6 # v0.2.2
    secrets:
      ANSIBLE_GALAXY_API_KEY: ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
