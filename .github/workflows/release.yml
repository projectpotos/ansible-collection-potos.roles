---
name: Release projectpotos.roles

# The version bump and changelog land on main through a release PR
on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: read
    uses: projectpotos/actions/.github/workflows/release-ansible-collection.yaml@ac5f831258705d1d8be540219f3167e208812395 # v0.4.0
    secrets:
      ANSIBLE_GALAXY_API_KEY: ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
