---
name: Release projectpotos.roles

# The version bump and changelog land on main through a release PR
on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: read
    uses: projectpotos/actions/.github/workflows/release-ansible-collection.yaml@31a073ace13fa1f689fe54cd71754f0ecba6dfb6 # v0.5.0
    secrets:
      ANSIBLE_GALAXY_API_KEY: ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
