---
name: "CI"

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  ci:
    permissions:
      contents: read
    uses: projectpotos/actions/.github/workflows/test-ansible-collection.yaml@31a073ace13fa1f689fe54cd71754f0ecba6dfb6 # v0.5.0
    with:
      molecule-scenarios: '["wallpaper"]'
      shellcheck-jinja: true

  all_green:
    name: all_green
    if: ${{ always() }}
    needs:
      - ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Verify no required job failed or was cancelled
        uses: projectpotos/actions/all-green@31a073ace13fa1f689fe54cd71754f0ecba6dfb6 # v0.5.0
        with:
          needs: ${{ toJSON(needs) }}
