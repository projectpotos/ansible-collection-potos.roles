---
name: "CI"

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  ci:
    permissions:
      contents: read
    uses: projectpotos/actions/.github/workflows/test-ansible-collection.yaml@ac5f831258705d1d8be540219f3167e208812395 # v0.4.0
    with:
      molecule-scenarios: '["wallpaper"]'

  all_green:
    name: all_green
    if: ${{ always() }}
    needs:
      - ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Verify no required job failed or was cancelled
        uses: projectpotos/actions/all-green@cc9fa23313351dbc2443f830da4a111f96d293c6 # v0.2.2
        with:
          needs: ${{ toJSON(needs) }}
