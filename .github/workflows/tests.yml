---
name: "CI"

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changelog:
    uses: ansible/ansible-content-actions/.github/workflows/changelog.yaml@main
    if: github.event_name == 'pull_request'
  build-import:
    uses: ansible/ansible-content-actions/.github/workflows/build_import.yaml@main
  ansible-lint:
    uses: ansible/ansible-content-actions/.github/workflows/ansible_lint.yaml@main
  sanity:
    uses: ansible/ansible-content-actions/.github/workflows/sanity.yaml@main
  unit-galaxy:
    uses: ansible/ansible-content-actions/.github/workflows/unit.yaml@main
  unit-source:
    uses: ansible-network/github_actions/.github/workflows/unit_source.yml@main
    with:
      # Only test against the recent python and ansible versions.
      matrix_exclude: >-
        [
          {"ansible-version": "devel"},
          {"ansible-version": "stable-2.16"},
          {"ansible-version": "stable-2.17"},
          {"ansible-version": "stable-2.18"},
          {"python-version": "3.10"},
          {"python-version": "3.11"},
          {"python-version": "3.12"}
        ]

  ruff:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: ruff check
        run: uv run --frozen ruff check --output-format=github .
      - name: ruff format
        run: uv run --frozen ruff format --check --diff .

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: yamllint
        run: uv run --frozen yamllint --strict --format github .

  changelog-lint:
    name: antsibull-changelog lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: antsibull-changelog lint
        run: uv run --frozen antsibull-changelog lint

  molecule:
    name: molecule (${{ matrix.scenario }} / ${{ matrix.distro }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        distro: [fedora44]
        scenario:
          - wallpaper
    env:
      MOLECULE_DISTRO: ${{ matrix.distro }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: molecule test
        run: uv run --frozen molecule test -s ${{ matrix.scenario }}

  all_green:
    if: ${{ always() }}
    needs:
      - changelog
      - build-import
      - ansible-lint
      - sanity
      - unit-galaxy
      - unit-source
      - ruff
      - yamllint
      - changelog-lint
      - molecule
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed or was cancelled
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: ${results}"
          if echo "${results}" | grep -Eq '"(failure|cancelled)"'; then
            echo "::error::At least one required job failed or was cancelled"
            exit 1
          fi
