---
version: "3"

# Developer task runner for the projectpotos.roles collection (https://taskfile.dev).
# All tasks run inside the uv-managed environment (see CONTRIBUTING).

vars:
  SCENARIOS:
    sh: ls -1 extensions/molecule/

  .molecule-precondition: &molecule-precondition
    - sh: test -d extensions/molecule/{{.SCENARIO}}
      msg: |
        Scenario '{{.SCENARIO}}' not found!
        Available:
          * {{.SCENARIOS | splitLines | join "\n  * "}}

  WORKERS: "1"

tasks:
  dev:setup:
    desc: Setup the development environment
    cmds:
      - uv sync
      - uv run pre-commit install

  sync:
    desc: Create/refresh the dev virtualenv from uv.lock
    cmds:
      - uv sync

  lint:
    desc: Run ruff, yamllint and ansible-lint
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .
      - uv run yamllint .
      - uv run ansible-lint

  format:
    desc: Auto-format and auto-fix with ruff
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .

  test:unit:
    desc: Run the unit tests with a coverage report
    cmds:
      - uv run pytest tests/unit -n 2 --cov=plugins --cov-report=term-missing --cov-report=html

  test:integration:
    desc: Run the integration tests
    cmds:
      - uv run pytest tests/integration

  test:sanity:
    desc: Run ansible-test sanity locally against a built copy of the collection
    vars:
      SANITY_DIR:
        sh: mktemp -d -t potos-sanity-XXXXXX
    cmds:
      - defer: rm -rf {{.SANITY_DIR}}
      - uv run ansible-galaxy collection build --output-path {{.SANITY_DIR}} --force
      - uv run ansible-galaxy collection install {{.SANITY_DIR}}/projectpotos-roles-*.tar.gz -p {{.SANITY_DIR}}/collections --force
      - cmd: >-
          cd {{.SANITY_DIR}}/collections/ansible_collections/projectpotos/roles &&
          uv run --project {{.ROOT_DIR}} ansible-test sanity --local --requirements

  test:
    desc: Run the full test suite
    cmds:
      - task: test:unit
      - task: test:sanity
      - task: test:integration

  molecule:test:
    desc: "Run molecule test for a single scenario (override: SCENARIO=name)"
    requires:
      vars: [SCENARIO]
    preconditions: *molecule-precondition
    cmds:
      - uv run molecule test -s {{.SCENARIO}}

  molecule:create:
    desc: "Run molecule create for a single scenario (override: SCENARIO=name)"
    requires:
      vars: [SCENARIO]
    preconditions: *molecule-precondition
    cmds:
      - uv run molecule create -s {{.SCENARIO}}

  molecule:converge:
    desc: "Run molecule converge for a single scenario (override: SCENARIO=name)"
    requires:
      vars: [SCENARIO]
    preconditions: *molecule-precondition
    cmds:
      - uv run molecule converge -s {{.SCENARIO}}

  molecule:verify:
    desc: "Run molecule verify for a single scenario (override: SCENARIO=name)"
    requires:
      vars: [SCENARIO]
    preconditions: *molecule-precondition
    cmds:
      - uv run molecule verify -s {{.SCENARIO}}

  molecule:destroy:
    desc: "Run molecule destroy for a single scenario (override: SCENARIO=name)"
    requires:
      vars: [SCENARIO]
    preconditions: *molecule-precondition
    cmds:
      - uv run molecule destroy -s {{.SCENARIO}}

  molecule:login:
    desc: "Run molecule login for a single scenario (override: SCENARIO=name)"
    requires:
      vars: [SCENARIO]
    preconditions: *molecule-precondition
    cmds:
      - uv run molecule login -s {{.SCENARIO}}

  molecule:all:test:
    desc: Run molecule test across every scenario in SCENARIOS
    cmds:
      - uv run molecule test --all --workers {{.WORKERS}}

  molecule:all:create:
    desc: Run molecule create across every scenario in SCENARIOS
    cmds:
      - uv run molecule create --all --workers {{.WORKERS}}

  molecule:all:converge:
    desc: Run molecule converge across every scenario in SCENARIOS
    cmds:
      - uv run molecule converge --all --workers {{.WORKERS}}

  molecule:all:verify:
    desc: Run molecule verify across every scenario in SCENARIOS
    cmds:
      - uv run molecule verify --all --workers {{.WORKERS}}

  molecule:all:destroy:
    desc: Run molecule destroy across every scenario in SCENARIOS
    cmds:
      - uv run molecule destroy --all --workers {{.WORKERS}}

  check:
    desc: Run lint + test
    cmds:
      - task: lint
      - task: test

  release:create:
    desc: Create a release PR with the version bump and generated changelog
    preconditions:
      - sh: git diff --quiet && git diff --cached --quiet
        msg: The working tree is not clean, commit or stash your changes first.
      - sh: command -v gh
        msg: The GitHub CLI (gh) is required to open the release PR.
    cmds:
      - cmd: |
          set -euo pipefail
          git fetch origin main --tags --prune

          echo "Latest release tags:"
          git tag --list 'v*' --sort=-v:refname | head -n 5

          printf 'Version to release (without leading v): '
          read -r version
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "'$version' is not a valid semantic version" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/v$version" >/dev/null; then
            printf 'Tag v%s already exists! Create the PR anyway, e.g. to reconcile main? [y/N] ' "$version"
            read -r answer
            case "$answer" in y|Y) ;; *) exit 1 ;; esac
          fi

          branch="release/v$version"
          git switch --create "$branch" origin/main

          sed -i -E "s/^version:.*/version: $version/" galaxy.yml
          uv run --frozen antsibull-changelog release --version "$version"

          git add galaxy.yml CHANGELOG.rst changelogs/

          uv run --frozen pre-commit run --files $(git diff --cached --name-only --diff-filter=AM) || true
          git add galaxy.yml CHANGELOG.rst changelogs/
          uv run --frozen pre-commit run --files $(git diff --cached --name-only --diff-filter=AM)

          git commit -m "chore: release v$version"
          git push --set-upstream origin "$branch"

          gh pr create --base main --title "chore: release v$version" \
            --body "Version bump and changelog for the v$version release. After merging, run \`task release:tag\` to tag it and trigger the publish workflow."

  release:tag:
    desc: Tag the merged release commit on origin/main to trigger the publish workflow
    cmds:
      - cmd: |
          set -euo pipefail
          git fetch origin main --tags --prune

          version="$(git show origin/main:galaxy.yml | sed -nE 's/^version: *"?([0-9][^" ]*)"?.*/\1/p')"
          if [ "$version" = "0.0.0" ] || ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "galaxy.yml on origin/main has no releasable version ('$version'), merge the release PR first" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/v$version" >/dev/null; then
            echo "Tag v$version already exists, nothing to do." >&2
            exit 1
          fi

          printf 'Tag %s on origin/main as v%s and push? [y/N] ' "$(git rev-parse --short origin/main)" "$version"
          read -r answer
          case "$answer" in y|Y) ;; *) exit 1 ;; esac

          git tag --annotate --message "Release v$version" "v$version" origin/main
          git push origin "v$version"
