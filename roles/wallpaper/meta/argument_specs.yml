---
argument_specs:
  main:
    short_description: Role to manage wallpapers of Potos Linux Clients.
    description:
      - Installs the given wallpapers into C(/usr/share/backgrounds),
        registers them in the GNOME wallpaper picker via
        C(gnome-background-properties), and sets the first image as the
        system-wide default background through a glib gschema override.
        Optionally removes any unmanaged wallpapers and picker entries.
        (O(wallpaper_remove_unmanaged))

    options:
      wallpaper_remove_unmanaged:
        description:
          - Opt-in. When V(true), wallpapers not listed in
            O(wallpaper_images) are removed from C(/usr/share/backgrounds)
            and their entries in
            C(/usr/share/gnome-background-properties) are deleted, so only
            the managed wallpapers remain in the GNOME picker.
        type: bool
        required: false
        default: false
      wallpaper_images:
        description:
          - List of files to be found under C(wallpaper/) to be added as
            background, first element is set as default.
        type: list
        elements: dict
        required: false
        default: []
        options:
          name:
            description: How the wallpaper is named to the user.
            type: str
            required: false
            default: Wallpaper
          filename:
            description:
              - Image file to install. Either a filename looked up under
                C(wallpaper/) in the playbook's file search path, or an
                absolute path on the potos host, e.g.
                V(/var/lib/potos/specs/files/wallpaper/potos.png).
            type: str
            required: true
          options:
            description: Determines how the image is rendered.
            type: str
            required: false
            default: zoom
            choices:
              - none
              - wallpaper
              - centered
              - scaled
              - stretched
              - zoom
              - spanned
          pcolor:
            description:
              - Left or top color when drawing gradients, or the solid
                color (any hex rgb value, e.g. V(#161b21)).
            type: str
            required: false
            default: "#161b21"
          scolor:
            description:
              - Right or bottom color when drawing gradients, not used for
                solid color (any hex rgb value, e.g. V(#161b21)).
            type: str
            required: false
            default: "#161b21"
          shade_type:
            description: How to shade the background color.
            type: str
            required: false
            default: solid
            choices:
              - horizontal
              - vertical
              - solid
